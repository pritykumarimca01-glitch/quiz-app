<!DOCTYPE html>
<html>
<head>
    <title>Prity Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Navbar -->
<nav>
    <h2>Prity</h2>
    <ul>
        <li><a href="#about">About</a></li>
        <li><a href="#skills">Skills</a></li>
        <li><a href="#projects">Projects</a></li>
        <li><a href="#contact">Contact</a></li>
    </ul>
</nav>

<button onclick="toggleDarkMode()" class="dark-btn">🌙</button>

<header>
    <h1>Hi, I'm Prity 👋</h1>
    <p id="typing"></p>
    <button onclick="downloadResume()">Download Resume</button>
</header>

<section id="about" class="about hidden">
    <img src="your-photo.jpg">
    <div>
        <h2>About Me</h2>
        <p>I am a passionate Java and Web Developer.</p>
    </div>
</section>

<section id="skills" class="hidden">
    <h2>Skills</h2>
    <div class="skill-box">Java</div>
    <div class="skill-box">HTML</div>
    <div class="skill-box">CSS</div>
    <div class="skill-box">JavaScript</div>
</section>

<section id="projects" class="hidden">
    <h2>Projects</h2>
    <div class="project">
        <h3>Quiz App</h3>
        <a href="https://pritykumarimca01-glitch.github.io/quiz-app/" target="_blank">View Project</a>
    </div>
</section>

<section id="contact" class="contact hidden">
    <h2>Contact Me</h2>

    <input type="text" id="name" placeholder="Prity kumari"><br>
    <input type="email" id="email" placeholder="pritykumari.mca01@gmail.com"><br>
    <textarea id="message" placeholder="Message"></textarea><br>
    <button onclick="sendMessage()">Send</button>
</section>

<footer>
    <p>© 2026 Prity</p>
</footer>

<script src="script.js"></script>
</body>
</html>
